<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Book</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
</head>
<body>
<div class="container mt-4">
    <h2>Edit Book</h2>
    <form th:action="@{/books/edit/{id}(id=${book.id})}" th:object="${book}" method="post">
        <div class="mb-3">
            <label>Title</label>
            <input type="text" class="form-control" th:field="*{title}" required/>
        </div>
        <div class="mb-3">
            <label>Author</label>
            <input type="text" class="form-control" th:field="*{author}" required/>
        </div>
        <div class="mb-3">
            <label>Genre</label>
            <input type="text" class="form-control" th:field="*{genre}"/>
        </div>
        <div class="mb-3">
            <label>ISBN</label>
            <input type="text" class="form-control" th:field="*{isbn}"/>
        </div>
        <div class="mb-3">
            <label>Price</label>
            <input type="number" step="0.01" class="form-control" th:field="*{price}"/>
        </div>
        <div class="mb-3">
            <label>Quantity</label>
            <input type="number" class="form-control" th:field="*{quantity}"/>
        </div>
        <div class="mb-3">
            <label>Category</label>
            <select class="form-control" th:field="*{category}">
                <option value="">-- Select Category --</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Update Book</button>
        <a href="/books" class="btn btn-secondary ms-2">Cancel</a>
    </form>
</div>
</body>
</html>
