spring.application.name=com.m3bookshelfpro

# Database - reads from environment variables (set in Heroku config vars)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/m3bookshelfpro?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password123!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server port - Heroku assigns $PORT dynamically
server.port=${PORT:8080}

# Logging with Log4J via SLF4J
logging.level.com.m3bookshelfpro=INFO
logging.level.org.springframework=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
